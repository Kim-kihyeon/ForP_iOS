name: Beta Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Tuist
        run: |
          brew install tuist

      - name: Create Secrets.xcconfig
        env:
          KAKAO_APP_KEY: ${{ secrets.KAKAO_APP_KEY }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          cat > App/Secrets.xcconfig << EOF
          DEVELOPMENT_TEAM = 697ACQDW6C
          CODE_SIGN_STYLE = Manual
          CODE_SIGN_IDENTITY = Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER = match AppStore com.kihyeonKim.ForP

          KAKAO_APP_KEY = ${KAKAO_APP_KEY}
          KAKAO_REST_KEY = ${KAKAO_REST_KEY}
          SUPABASE_HOST = ${SUPABASE_HOST}
          SUPABASE_ANON_KEY = ${SUPABASE_ANON_KEY}
          OPENAI_API_KEY = ${OPENAI_API_KEY}
          OPENWEATHER_API_KEY = ${OPENWEATHER_API_KEY}
          EOF

      - name: Tuist Install & Generate
        run: |
          tuist install
          tuist generate --no-open

      - name: Configure Git Credentials
        env:
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          DECODED=$(echo "$MATCH_GIT_BASIC_AUTHORIZATION" | base64 --decode)
          USERNAME=$(echo "$DECODED" | cut -d: -f1)
          TOKEN=$(echo "$DECODED" | cut -d: -f2-)
          echo "machine github.com login ${USERNAME} password ${TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc

      - name: Write API Key
        env:
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" | tr -d ' \n' | base64 -d > /tmp/AuthKey.p8
          echo "first line: $(head -1 /tmp/AuthKey.p8)"
          echo "bytes: $(wc -c < /tmp/AuthKey.p8)"

      - name: Patch fastlane for OpenSSL 3.x compatibility
        run: |
          TOKEN_FILE=$(find vendor/bundle -path "*/spaceship/lib/spaceship/connect_api/token.rb" 2>/dev/null | head -1)
          echo "TOKEN_FILE: $TOKEN_FILE"
          if [ -n "$TOKEN_FILE" ]; then
            grep -n "PKey" "$TOKEN_FILE" || echo "PKey not found in file"
            ruby -e "
              f = '$TOKEN_FILE'
              c = File.read(f)
              patched = c.gsub('OpenSSL::PKey::EC.new', 'OpenSSL::PKey.read')
              File.write(f, patched)
              puts 'Patched: ' + f
              puts 'Changed: ' + (c != patched).to_s
            "
            grep -n "PKey" "$TOKEN_FILE"
          else
            echo "token.rb not found in vendor/bundle"
            exit 1
          fi

      - name: Validate API Key JWT
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          bundle exec ruby -r 'openssl' -r 'net/http' -r 'uri' -e "
            require 'jwt'
            key_id = ENV['ASC_KEY_ID']
            issuer_id = ENV['ASC_ISSUER_ID']
            key_content = File.read('/tmp/AuthKey.p8')

            puts 'Key ID length: ' + key_id.to_s.length.to_s
            puts 'Issuer ID length: ' + issuer_id.to_s.length.to_s
            puts 'Key first line: ' + key_content.lines.first.chomp

            begin
              pkey = OpenSSL::PKey.read(key_content)
              puts 'Key loaded: ' + pkey.class.to_s

              now = Time.now.to_i
              payload = { iss: issuer_id, iat: now, exp: now + 1200, aud: 'appstoreconnect-v1' }
              token = JWT.encode(payload, pkey, 'ES256', { kid: key_id, typ: 'JWT' })
              puts 'JWT length: ' + token.length.to_s

              uri = URI('https://api.appstoreconnect.apple.com/v1/apps?limit=1')
              http = Net::HTTP.new(uri.host, uri.port)
              http.use_ssl = true
              req = Net::HTTP::Get.new(uri)
              req['Authorization'] = 'Bearer ' + token
              res = http.request(req)
              puts 'API response code: ' + res.code
              puts 'API response body: ' + res.body[0..400] if res.code != '200'
            rescue => e
              puts 'Error: ' + e.class.to_s + ': ' + e.message
            end
          "

      - name: Cache Derived Data
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-data-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-derived-data-

      - name: Deploy to TestFlight
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: 3
          BUILD_NUMBER: ${{ github.run_number }}
          FASTLANE_APPLE_ID: kimki1125@naver.com
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
        run: bundle exec fastlane beta
